[tools]
go = { version = "1.24" }

[tasks.fmt]
description = "Run gofmt"
run = "gofmt -s -w ."

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks.vet]
description = "Run go vet"
run = "go vet ./..."

[tasks."test:ci"]
description = "Run tests with race detection"
run = "go test -race ./..."

[tasks.build]
description = "Build the plugin binary"
run = "go build -o entire-sem ./cmd/entire-sem"

[tasks.install]
description = "Build and install the plugin into the local Entire CLI"
run = "scripts/install-local.sh"

[tasks.release]
description = "Build checksum-backed release archives under dist/"
run = "scripts/release.sh"

[tasks.check]
description = "Run formatting, vet, tests, and build"
depends = ["fmt", "vet", "test:ci", "build"]
